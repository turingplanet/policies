# THE ONE FLOW (constant #2): read manifest -> set up declared toolchain -> install + declared tests
# -> checks -> GATE DECIDES. The LLM review is advisory and structurally cannot gate (constant #3).
# Referenced live by members as @vN (REFERENCE path).
name: review-reusable

on:
  workflow_call:
    inputs:
      contract:
        description: Contract version the gate enforces against.
        type: string
        default: v1
    secrets:
      ANTHROPIC_API_KEY:
        description: Key for the advisory LLM review. Optional — absent on fork PRs; the agent skips.
        required: false

permissions:
  contents: read
  pull-requests: write   # lets the advisory agent post a PR comment (best-effort)

env:
  MANIFEST_PATH: agent.manifest.yaml   # the anchor — the one hardcoded path

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1) READ THE MANIFEST (the seam). The runner ships mikefarah yq; scalars print raw (no -r).
      - name: Read manifest
        id: m
        run: |
          test -f "$MANIFEST_PATH" || { echo "::error::no manifest at the anchor ($MANIFEST_PATH)"; exit 1; }
          {
            echo "language=$(yq '.toolchain.language'        "$MANIFEST_PATH")"
            echo "pm=$(yq       '.toolchain.packageManager'  "$MANIFEST_PATH")"
            echo "profile=$(yq  '.profile'                   "$MANIFEST_PATH")"
            echo "install=$(yq  '.commands.install'          "$MANIFEST_PATH")"
            echo "test=$(yq     '.commands.test'             "$MANIFEST_PATH")"
            echo "lint=$(yq     '.commands.lint     // ""'   "$MANIFEST_PATH")"
            echo "security=$(yq '.commands.security // ""'   "$MANIFEST_PATH")"
          } >> "$GITHUB_OUTPUT"

      # 2) SET UP DECLARED TOOLCHAIN — driven by the manifest, not hardcoded per repo.
      - name: Set up Python
        if: steps.m.outputs.language == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Set up poetry
        if: steps.m.outputs.pm == 'poetry'
        run: pipx install poetry

      # ---- HARD CHECKS ---- these FAIL the build. The gate weighs exactly these.
      - name: Contract check — manifest matches schema at the contract version
        run: |
          yq -o=json '.' "$MANIFEST_PATH" > /tmp/manifest.json
          npx --yes ajv-cli@5 validate --spec=draft2020 -s manifest.schema.json -d /tmp/manifest.json

      - name: Install (declared)
        run: ${{ steps.m.outputs.install }}

      - name: Tests (declared)
        run: ${{ steps.m.outputs.test }}

      - name: Lint (declared, if present)
        if: steps.m.outputs.lint != ''
        run: ${{ steps.m.outputs.lint }}

      - name: Security scan (declared, if present)
        if: steps.m.outputs.security != ''
        run: ${{ steps.m.outputs.security }}

      # ---- ADVISORY ---- the standing review agent. Every step here is continue-on-error,
      # so the agent REPORTS but the gate DECIDES (constant #3).
      - name: Resolve agent version
        id: agentref
        continue-on-error: true
        run: echo "ref=${GITHUB_WORKFLOW_REF##*@}" >> "$GITHUB_OUTPUT"

      - name: Fetch the standing review agent (policies @ this version)
        continue-on-error: true
        uses: actions/checkout@v4
        with:
          repository: turingplanet/policies
          ref: ${{ steps.agentref.outputs.ref }}
          path: .policies
          persist-credentials: false

      - name: LLM code review (advisory only — never gates)
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [ -f .policies/agent/review.sh ]; then
            bash .policies/agent/review.sh "$MANIFEST_PATH"
          else
            echo "review agent unavailable — advisory step skipped" >> "$GITHUB_STEP_SUMMARY"
          fi

  # THE GATE = this job succeeding (every hard-check step above passed). The advisory steps are
  # continue-on-error, so the agent can never flip the result.
